name: Build Python venv

on:
  workflow_dispatch:
    inputs:
      hermes_agent_commit:
        description: 'Hermes-agent git commit hash'
        required: false
        default: '486b692ddd801f8f665d3fff023149fb1cb6509e'
      upload_to_release:
        description: 'Upload to GitHub Release (tag name, e.g. v1.3.43)'
        required: false
        default: ''

env:
  TERMUX_APK_URL: 'https://github.com/termux/termux-app/releases/download/v0.119.0-beta.1/termux-app_v0.119.0-beta.1+github.debug_arm64-v8a.apk'

jobs:
  build-venv:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK and emulator
        run: |
          # Install cmdline-tools
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          curl -fsSL "$CMDLINE_TOOLS_URL" -o /tmp/cmdline-tools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          unzip -q /tmp/cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools/latest
          # zip extracts as cmdline-tools/bin/..., move up one level
          mv $HOME/android-sdk/cmdline-tools/latest/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

          # Accept licenses
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # Install emulator, platform-tools, and ARM64 system image
          sdkmanager --install "platform-tools" "emulator" \
            "system-images;android-34;default;arm64-v8a"

          # Create AVD
          avdmanager create avd -n termux -k "system-images;android-34;default;arm64-v8a" -d "pixel_6" --force

      - name: Start emulator
        run: |
          # Start emulator in background with no window
          emulator -avd termux -no-window -noaudio -gpu swiftshader_indirect -no-snapshot -no-metrics -no-boot-anim &
          EMU_PID=$!

          # Wait for boot
          echo "Waiting for emulator to boot..."
          for i in $(seq 1 120); do
            if adb shell getprop sys.boot_completed 2>/dev/null | grep -q 1; then
              echo "Emulator booted after ${i}s"
              break
            fi
            sleep 5
          done

          adb shell getprop sys.boot_completed || echo "WARNING: boot check failed"

      - name: Install Termux on emulator
        run: |
          curl -fsSL "$TERMUX_APK_URL" -o /tmp/termux.apk
          adb install /tmp/termux.apk

          # Launch Termux to trigger bootstrap
          adb shell am start -n com.termux/.app.TermuxActivity
          sleep 10

          # Wait for Termux bootstrap to complete
          echo "Waiting for Termux bootstrap..."
          for i in $(seq 1 60); do
            if adb shell "ls /data/data/com.termux/files/usr/bin/bash" 2>/dev/null | grep -q bash; then
              echo "Termux bootstrap complete after ${i}s"
              break
            fi
            sleep 5
          done

          # Verify
          adb shell "ls /data/data/com.termux/files/usr/bin/bash" || {
            echo "ERROR: Termux bootstrap failed"
            exit 1
          }

      - name: Build venv in Termux
        run: |
          # Push build script to emulator
          adb push scripts/build-venv-termux.sh /data/local/tmp/build-venv.sh

          # Make executable and run inside Termux
          adb shell "chmod 755 /data/local/tmp/build-venv.sh"
          adb shell "su -c 'export HOME=/data/data/com.termux/files/home && export PREFIX=/data/data/com.termux/files/usr && export PATH=/data/data/com.termux/files/usr/bin:\$PATH && export TMPDIR=/data/data/com.termux/files/usr/tmp && /data/data/com.termux/files/usr/bin/bash /data/local/tmp/build-venv.sh'"

      - name: Pull venv from emulator
        run: |
          adb shell "su -c 'ls -lh /data/data/com.termux/files/home/.hermes/hermes-agent/venv-aarch64.tar.gz'"
          adb pull /data/data/com.termux/files/home/.hermes/hermes-agent/venv-aarch64.tar.gz .
          ls -lh venv-aarch64.tar.gz

      - name: Verify output
        run: |
          if [ ! -f venv-aarch64.tar.gz ]; then
            echo "ERROR: venv-aarch64.tar.gz not found"
            exit 1
          fi
          echo "venv-aarch64.tar.gz size: $(du -h venv-aarch64.tar.gz | cut -f1)"

      - name: Upload venv artifact
        uses: actions/upload-artifact@v4
        with:
          name: venv-aarch64
          path: venv-aarch64.tar.gz
          retention-days: 30

      - name: Upload to release
        if: github.event.inputs.upload_to_release != ''
        run: |
          gh release upload "${{ github.event.inputs.upload_to_release }}" \
            venv-aarch64.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
