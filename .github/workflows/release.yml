name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag_name: ${{ steps.tag.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "name=$TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGES=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          cat > release_notes.md <<RELEASE_EOF
          ## What's Changed

          ${{ steps.changelog.outputs.changes }}

          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG_NAME}

          ### Installation
          1. Download the APK for your device (`apt-android-7` for Android 7+, `apt-android-5` for Android 5+)
          2. Enable "Install from unknown sources" in your device settings
          3. Install the APK
          4. Open the app and follow the setup wizard
          RELEASE_EOF

          gh release create "$TAG_NAME" \
            --notes-file release_notes.md \
            --title "Hermux ${TAG_NAME#v}" \
            --draft

      - name: Summary
        run: |
          echo "### Release Created :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ steps.tag.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Draft (pending APK builds)" >> $GITHUB_STEP_SUMMARY

  build-and-upload:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Patch bootstrap (com.termux → com.hermux)
        shell: bash
        run: bash scripts/patch-bootstrap.sh "$GITHUB_WORKSPACE/app/src/main/cpp"

      - name: Build release APK
        shell: bash
        env:
          TERMUX_PACKAGE_VARIANT: ${{ matrix.package_variant }}
          TERMUX_SPLIT_APKS_FOR_RELEASE_BUILDS: "1"
        run: |
          TAG_NAME="${{ needs.create-release.outputs.tag_name }}"
          APK_DIR_PATH="./app/build/outputs/apk/release"
          VARIANT_SUFFIX="${{ matrix.package_variant == 'apt-android-5' && 'android5' || 'android7' }}"
          APK_VERSION_TAG="$TAG_NAME+$VARIANT_SUFFIX"
          APK_BASENAME_PREFIX="hermux_$APK_VERSION_TAG"

          export TERMUX_APP_VERSION_NAME="${TAG_NAME#v}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"

          ./gradlew downloadBootstraps assembleRelease

          echo "Generating sha256sums"
          (cd "$APK_DIR_PATH" && sha256sum *.apk > "${APK_BASENAME_PREFIX}_sha256sums")

          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV

      - name: Verify APK signing
        run: |
          for apk in ${{ env.APK_DIR_PATH }}/*.apk; do
            echo "Verifying: $(basename $apk)"
            if unzip -l "$apk" META-INF/\*.\* > /dev/null 2>&1; then
              echo "  OK: Signed (META-INF found)"
            else
              echo "  ERROR: Unsigned APK!"
              exit 1
            fi
          done

      - name: Upload APKs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ needs.create-release.outputs.tag_name }}"
          gh release upload --clobber "$TAG_NAME" ${{ env.APK_DIR_PATH }}/*.apk ${{ env.APK_DIR_PATH }}/*_sha256sums

      - name: Summary
        if: always()
        run: |
          echo "### Build ${{ matrix.package_variant }} ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Variant**: \`${{ matrix.package_variant }}\`" >> $GITHUB_STEP_SUMMARY

  publish-release:
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ needs.create-release.outputs.tag_name }}"
          gh release edit "$TAG_NAME" --draft=false

      - name: Upload APKs to Supabase
        if: ${{ secrets.SUPABASE_URL != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TAG_NAME: ${{ needs.create-release.outputs.tag_name }}
        run: |
          TAG_NAME="${{ needs.create-release.outputs.tag_name }}"
          VERSION="${TAG_NAME#v}"

          # Download APKs from GitHub release
          mkdir -p /tmp/apks
          gh release download "$TAG_NAME" -D /tmp/apks '*.apk'

          for APK in /tmp/apks/*.apk; do
            BASENAME=$(basename "$APK")
            echo "Processing $BASENAME"

            # Determine ABI from filename
            ABI="arm64-v8a"
            if echo "$BASENAME" | grep -q "armeabi"; then ABI="armeabi-v7a"; fi
            if echo "$BASENAME" | grep -q "x86_64"; then ABI="x86_64"; fi
            if echo "$BASENAME" | grep -q "x86[^_]"; then ABI="x86"; fi
            if echo "$BASENAME" | grep -q "universal"; then ABI="universal"; fi

            # Determine variant (android7 or android5)
            VARIANT="android7"
            if echo "$BASENAME" | grep -q "android5"; then VARIANT="android5"; fi

            # Skip android5 variants for Supabase (primary target is android7)
            if [ "$VARIANT" = "android5" ]; then
              echo "Skipping android5 variant: $BASENAME"
              continue
            fi

            SHA256=$(sha256sum "$APK" | cut -d' ' -f1)
            FILE_SIZE=$(stat --printf="%s" "$APK" 2>/dev/null || stat -f%z "$APK")

            # Upload APK to Supabase Storage
            STORAGE_PATH="hermux_${VERSION}_${ABI}.apk"
            echo "Uploading to Storage: $STORAGE_PATH"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${SUPABASE_URL}/storage/v1/object/public/apk-releases/${STORAGE_PATH}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"$APK")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              DOWNLOAD_URL="${SUPABASE_URL}/storage/v1/object/public/apk-releases/${STORAGE_PATH}"
              MIRROR_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${BASENAME}"
              echo "Upload successful: $DOWNLOAD_URL"
            else
              echo "Storage upload failed (HTTP $HTTP_CODE), using GitHub mirror only"
              DOWNLOAD_URL=""
              MIRROR_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${BASENAME}"
            fi

            # Clear previous is_latest flag for this ABI
            curl -s -o /dev/null \
              -X PATCH "${SUPABASE_URL}/rest/v1/app_versions?abi=eq.${ABI}&channel=eq.stable" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d '{"is_latest":false}'

            # Insert version record
            # Extract versionCode from build.gradle (fallback to simple calc)
            VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | awk '{print $2}')

            curl -s -o /dev/null \
              -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{
                \"version_name\": \"${VERSION}\",
                \"version_code\": ${VERSION_CODE},
                \"min_supported_version_code\": 0,
                \"abi\": \"${ABI}\",
                \"download_url\": \"${DOWNLOAD_URL}\",
                \"download_url_mirror\": \"${MIRROR_URL}\",
                \"sha256\": \"${SHA256}\",
                \"file_size\": ${FILE_SIZE},
                \"release_notes\": \"\",
                \"release_notes_zh\": \"\",
                \"force_update\": false,
                \"channel\": \"stable\",
                \"is_latest\": true
              }"

            echo "Version record created for ${ABI}"
          done

      - name: Summary
        run: |
          echo "### Release Published :tada:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ needs.create-release.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://github.com/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
