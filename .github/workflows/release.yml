name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGES=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          cat > release_notes.md <<RELEASE_EOF
          ## What's Changed

          ${{ steps.changelog.outputs.changes }}

          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG_NAME}

          ### Installation
          1. Download the APK for your device (apt-android-7 for Android 7+, apt-android-5 for Android 5+)
          2. Enable "Install from unknown sources" in your device settings
          3. Install the APK
          4. Open the app and follow the setup wizard
          RELEASE_EOF

          gh release create "$TAG_NAME" \
            --notes-file release_notes.md \
            --title "Hermes Termux ${TAG_NAME#v}" \
            --draft

  build-and-upload:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build release APK
        shell: bash
        env:
          TERMUX_PACKAGE_VARIANT: ${{ matrix.package_variant }}
          TERMUX_SPLIT_APKS_FOR_RELEASE_BUILDS: "1"
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          APK_DIR_PATH="./app/build/outputs/apk/release"
          APK_VERSION_TAG="$TAG_NAME+${{ matrix.package_variant }}-github-release"
          APK_BASENAME_PREFIX="hermes-termux-app_$APK_VERSION_TAG"

          export TERMUX_APP_VERSION_NAME="${TAG_NAME#v}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"

          ./gradlew downloadBootstraps assembleRelease

          echo "Generating sha256sums"
          (cd "$APK_DIR_PATH" && sha256sum *.apk > "${APK_BASENAME_PREFIX}_sha256sums")

          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV

      - name: Upload APKs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG_NAME" ${{ env.APK_DIR_PATH }}/*.apk ${{ env.APK_DIR_PATH }}/*_sha256sums

  publish-release:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release edit "$TAG_NAME" --draft=false
