name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        env:
          TERMUX_PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: ./gradlew downloadBootstraps assembleDebug

      - name: Build release APK (unsigned)
        env:
          TERMUX_PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: ./gradlew downloadBootstraps assembleRelease

      - name: List APK files and sizes
        run: |
          echo "### APK Build Summary (${{ matrix.package_variant }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in app/build/outputs/apk/**/*.apk; do
            name=$(basename "$f")
            size=$(du -h "$f" | cut -f1)
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload debug APKs
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-${{ matrix.package_variant }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload release APKs
        uses: actions/upload-artifact@v7
        with:
          name: release-apk-${{ matrix.package_variant }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
