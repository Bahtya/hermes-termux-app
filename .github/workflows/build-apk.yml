name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        env:
          TERMUX_PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: ./gradlew downloadBootstraps assembleDebug

      - name: Build release APK (unsigned)
        env:
          TERMUX_PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: ./gradlew downloadBootstraps assembleRelease

      - name: Upload debug APKs
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk-${{ matrix.package_variant }}
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APKs
        uses: actions/upload-artifact@v6
        with:
          name: release-apk-${{ matrix.package_variant }}
          path: app/build/outputs/apk/release/*.apk
