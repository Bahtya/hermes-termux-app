name: Patch Bootstrap

on:
  workflow_dispatch:
    inputs:
      upstream_version:
        description: 'Upstream bootstrap version (e.g. 2026.02.12-r1)'
        required: true
        type: string
      variant:
        description: 'Package variant'
        required: true
        type: choice
        options:
          - apt-android-7
          - apt-android-5
        default: apt-android-7

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, arm, i686, x86_64]

    steps:
      - name: Download upstream bootstrap
        env:
          VERSION: ${{ inputs.upstream_version }}+${{ inputs.variant == 'apt-android-5' && '+' || '%2B' }}${{ inputs.variant == 'apt-android-7' && 'apt.android-7' || inputs.variant }}
        run: |
          URL="https://github.com/termux/termux-packages/releases/download/bootstrap-${VERSION}/bootstrap-${{ matrix.arch }}.zip"
          echo "Downloading $URL"
          curl -fSL -o bootstrap-upstream.zip "$URL"

      - name: Patch paths (com.termux → com.bahtya)
        run: |
          mkdir work && cd work
          unzip ../bootstrap-upstream.zip

          OLD="/data/data/com.termux"
          NEW="/data/data/com.bahtya"

          # Patch SYMLINKS.txt
          if [ -f SYMLINKS.txt ]; then
            sed -i "s|${OLD}|${NEW}|g" SYMLINKS.txt
          fi

          # Patch text config files (etc/*, share/*)
          find . -type f \( -path './etc/*' -o -path './share/*' \) \
            -exec sed -i "s|${OLD}|${NEW}|g" {} +

          # Patch ELF binaries (bin/*, lib/*, libexec/*) — equal length, direct replacement
          find . -type f \( -path './bin/*' -o -path './lib/*' -o -path './libexec/*' \) | while read f; do
            perl -pi -e "s|/data/data/com\\.termux|/data/data/com\\.bahtya|g" "$f"
          done

          # Repack
          cd ..
          rm -f bootstrap-${{ matrix.arch }}.zip
          cd work && zip -r ../bootstrap-${{ matrix.arch }}.zip . && cd ..

      - name: Compute SHA256
        id: sha
        run: |
          sha256sum bootstrap-${{ matrix.arch }}.zip > bootstrap-${{ matrix.arch }}.sha256
          cat bootstrap-${{ matrix.arch }}.sha256
          echo "sha=$(cut -d' ' -f1 bootstrap-${{ matrix.arch }}.sha256)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.arch }}
          path: |
            bootstrap-${{ matrix.arch }}.zip
            bootstrap-${{ matrix.arch }}.sha256

  release:
    needs: patch
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="bootstrap-${{ inputs.upstream_version }}"
          TITLE="Pre-patched Bootstrap ${{ inputs.upstream_version }} (${{ inputs.variant }})"

          # Collect SHA256 for release body
          BODY="SHA256 checksums:\n"
          for arch in aarch64 arm i686 x86_64; do
            SHA=$(cat artifacts/bootstrap-${arch}.sha256 | cut -d' ' -f1)
            BODY="${BODY}\n- \`${arch}\`: \`${SHA}\`"
          done
          BODY="${BODY}\n\nVariant: \`${{ inputs.variant }}\`"
          BODY="${BODY}\n\nEqual-length replacement: \`/data/data/com.termux\` → \`/data/data/com.bahtya\`"

          gh release create "$TAG" \
            artifacts/bootstrap-*.zip \
            --target main \
            --title "$TITLE" \
            --notes "$(echo -e "$BODY")"
