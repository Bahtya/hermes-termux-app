name: Nightly Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.package_variant }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.package_variant }}-

      - name: Patch bootstrap (com.termux → com.bahtya)
        shell: bash
        run: |
          OLD="/data/data/com.termux"
          NEW="/data/data/com.bahtya"
          BOOTSTRAP_DIR="$GITHUB_WORKSPACE/app/src/main/cpp"
          mkdir -p "$BOOTSTRAP_DIR"

          for arch in aarch64 arm i686 x86_64; do
            ZIP="${BOOTSTRAP_DIR}/bootstrap-${arch}.zip"
            if [ -f "${ZIP}" ]; then continue; fi
            VERSION="2026.02.12-r1%2Bapt.android-7"
            curl -fSL -o "${ZIP}" "https://github.com/termux/termux-packages/releases/download/bootstrap-${VERSION}/bootstrap-${arch}.zip"
          done

          for arch in aarch64 arm i686 x86_64; do
            ZIP="${BOOTSTRAP_DIR}/bootstrap-${arch}.zip"
            mkdir -p /tmp/patch-${arch} && cd /tmp/patch-${arch}
            unzip -o "${ZIP}"
            [ -f SYMLINKS.txt ] && sed -i "s|${OLD}|${NEW}|g" SYMLINKS.txt
            find . -type f \( -path './etc/*' -o -path './share/*' \) -exec sed -i "s|${OLD}|${NEW}|g" {} +
            find . -type f \( -path './bin/*' -o -path './lib/*' -o -path './libexec/*' \) | while read f; do
              perl -pi -e "s|/data/data/com\\.termux|/data/data/com\\.bahtya|g" "$f"
            done
            rm -f "${ZIP}"; zip -r "${ZIP}" .; cd -; rm -rf /tmp/patch-${arch}
          done

      - name: Build debug APK
        shell: bash
        env:
          TERMUX_PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG_NAME="nightly-${DATE}"
          APK_VERSION_TAG="nightly-${DATE}-${SHORT_SHA}+${{ matrix.package_variant }}-github-debug"
          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_BASENAME_PREFIX="hermes-termux-app_${APK_VERSION_TAG}"

          export TERMUX_APP_VERSION_NAME="0.0.0-nightly"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"

          ./gradlew downloadBootstraps assembleDebug

          # Rename APKs with clear names
          cd "$APK_DIR_PATH"
          for apk in *.apk; do
            mv "$apk" "${APK_BASENAME_PREFIX}.apk"
          done

          sha256sum *.apk > "${APK_BASENAME_PREFIX}_sha256sums"

          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Upload APKs to nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ env.TAG_NAME }}"

          # Delete existing nightly release for this variant if it exists
          gh release delete "$TAG_NAME" --yes 2>/dev/null || true
          git tag -d "$TAG_NAME" 2>/dev/null || true

          # Create fresh nightly release
          gh release create "$TAG_NAME" \
            ${{ env.APK_DIR_PATH }}/*.apk \
            ${{ env.APK_DIR_PATH }}/*_sha256sums \
            --title "Nightly Build $(date +%Y-%m-%d)" \
            --notes "Automated debug build from main branch.

          **Commit**: $(git rev-parse --short HEAD)
          **Date**: $(date +%Y-%m-%d)
          **Variant**: ${{ matrix.package_variant }}

          > **Warning**: This is an automated nightly build and may be unstable.
          > Download the APK matching your device architecture.

          **Installation**:
          1. Download the APK for your device
          2. Enable \"Install from unknown sources\"
          3. Install the APK" \
            --prerelease

      - name: Summary
        if: always()
        run: |
          echo "### Nightly Build ${{ matrix.package_variant }} ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
