name: Unit tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: tests-${{ github.ref }}-${{ matrix.package_variant }}
  cancel-in-progress: true

jobs:
  testing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
    - name: Clone repository
      uses: actions/checkout@v6

    - name: Setup java 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ matrix.package_variant }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-${{ matrix.package_variant }}-

    - name: Execute tests
      env:
        TERMUX_PACKAGE_VARIANT: ${{ matrix.package_variant }}
      run: ./gradlew downloadBootstraps test

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-report-${{ matrix.package_variant }}
        path: app/build/reports/tests/
